services:
  - type: web
    name: querymind-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --app-dir backend
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: LLM
        value: groq
